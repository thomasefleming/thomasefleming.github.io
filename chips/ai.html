<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>co-intelligence: Retro-Futuristic AI Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: rgba(86, 241, 255, 0.7);
            font-family: 'Space Mono', monospace;
            margin: 0;
            padding: 20px;
            background-image: 
                radial-gradient(rgba(86, 241, 255, 0.1) 2px, transparent 2px),
                radial-gradient(rgba(86, 241, 255, 0.1) 2px, transparent 2px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(86, 241, 255, 0.7);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(86, 241, 255, 0.3);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3em;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(86, 241, 255, 0.7);
        }
        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2em;
            margin-top: 30px;
            border-bottom: 2px solid rgba(86, 241, 255, 0.7);
            padding-bottom: 10px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin-bottom: 15px;
        }
        a {
            color: rgba(86, 241, 255, 0.9);
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
        }
        a:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(86, 241, 255, 1);
            transform: scale(1.05);
        }
        .glow {
            animation: glow 1.5s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from {
                text-shadow: 0 0 5px rgba(86, 241, 255, 0.7), 0 0 10px rgba(86, 241, 255, 0.7);
            }
            to {
                text-shadow: 0 0 10px rgba(86, 241, 255, 0.7), 0 0 20px rgba(86, 241, 255, 0.7), 0 0 30px rgba(86, 241, 255, 0.7);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glow">co-intelligence</h1>
        
        <h2>Artificial Intelligence Tools</h2>
        <ul>
            <li><a href="https://claude.ai/">Anthropic Claude</a></li>
            <li><a href="https://copilot.microsoft.com/">Microsoft Copilot</a></li>
            <li><a href="https://chatgpt.com/">OpenAI ChatGPT</a></li>
            <li><a href="https://gemini.google.com/">Google Gemini</a></li>
            <li><a href="https://chat.mistral.ai/chat">Mistral Le Chat</a></li>
            <li><a href="https://www.perplexity.ai/">Perplexity</a></li>
        </ul>
        
        <h2>Translation Tools</h2>
        <ul>
            <li><a href="https://www.deepl.com/en/translator">Deepl Translator</a></li>
            <li><a href="https://apps.apple.com/us/app/translate/id1514844618">Apple Translate</a></li>
            <li><a href="https://translate.google.com/">Google Translate</a></li>
            <li><a href="https://www.bing.com/translator/">Microsoft Bing Translator</a></li>
        </ul>
    </div>
</body>
</html>
