        transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .header-link, .toronto-text {
        color: rgba(105, 105, 105, 0.5);
        font-size: 1em;
        text-shadow: 0 0 8px rgba(105, 105, 105, 0.5);
    }
    .header-link-main {
        font-size: 1.2em;
        color: rgba(105, 105, 105, 0.5);
        transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    .header-link-main:hover,
    .header-link-main:focus {
        color: rgba(0, 255, 0, 0.7);
        text-shadow: 0 0 10px rgba(0, 255, 0, 0.7), 0 0 20px rgba(0, 255, 0, 0.7), 0 0 30px rgba(3, 3, 3, 0.7);
    }
    .highlight-link:hover,
    .highlight-link:focus {
        text-shadow: 0 0 10px rgba(0, 255, 0, 0.7), 0 0 20px rgba(0, 255, 0, 0.7), 0 0 30px rgba(0, 255, 0, 0.7);
    }
    .glow-initial {
        color: rgba(0, 255, 0, 0.7);
        text-shadow: 0 0 10px rgba(0, 255, 0, 0.7), 0 0 20px rgba(0, 255, 0, 0.7), 0 0 30px rgba(0, 255, 0, 0.7);
        animation: initialGlow 5s forwards;
    }
    @keyframes initialGlow {
        0%, 80% {
            color: rgba(0, 255, 0, 0.7);
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.7), 0 0 20px rgba(0, 255, 0, 0.7), 0 0 30px rgba(0, 255, 0, 0.7);
        }
        100% {
            color: rgba(105, 105, 105, 0.5);
            text-shadow: none;
        }
    }
    .highlight-link {
        animation: torontoGlow 7s forwards;
    }
    @keyframes torontoGlow {
        0%, 60% {
            color: rgba(105, 105, 105, 0.5);
            text-shadow: none;
        }
        80%, 100% {
            color: rgba(0, 255, 0, 0.7);
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.7), 0 0 20px rgba(0, 255, 0, 0.7), 0 0 30px rgba(0, 255, 0, 0.7);
        }
    }
    .glow-o-chips, .glow-chips {
    color: rgba(86, 241, 255, 1)!important;
    text-shadow: 0 0 5px rgba(86, 241, 255, 0.7),
                 0 0 10px rgba(86, 241, 255, 0.7),
                 0 0 15px rgba(86, 241, 255, 0.7),
                 0 0 20px rgba(86, 241, 255, 0.7) !important;
    transition: all 0.3s ease;
    animation: none !important;
}
.glow-o-chips:hover, .glow-chips:hover {
    color: rgba(86, 241, 255, 1)!important;
    text-shadow: 0 0 10px rgba(86, 241, 255, 0.9),
                 0 0 20px rgba(86, 241, 255, 0.9),
                 0 0 30px rgba(86, 241, 255, 0.9),
                 0 0 40px rgba(86, 241, 255, 0.9) !important;
}

/* Add a subtle animation to enhance the glow effect */
@keyframes subtleGlow {
    0%, 100% {
        text-shadow: 0 0 5px rgba(86, 241, 255, 0.7),
                     0 0 10px rgba(86, 241, 255, 0.7),
                     0 0 15px rgba(86, 241, 255, 0.7),
                     0 0 20px rgba(86, 241, 255, 0.7);
    }
    50% {
        text-shadow: 0 0 10px rgba(86, 241, 255, 0.9),
                     0 0 20px rgba(86, 241, 255, 0.9),
                     0 0 30px rgba(86, 241, 255, 0.9),
                     0 0 40px rgba(86, 241, 255, 0.9);
    }
}

.glow-o-chips, .glow-chips {
    animation: subtleGlow 2s ease-in-out infinite !important;
}

/* New media query for mobile devices */
@media screen and (max-width: 768px) {
    .header-link-main {
        font-size: 0.6em; /* Half the original size */
    }
    
    /* Adjust other header elements if needed */
    .header-link, .toronto-text {
        font-size: 0.8em;
    }
    
    /* Ensure the header stays on one line */
    .page-header h1 {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none;  /* Internet Explorer 10+ */
    }
    
    /* Hide scrollbar for Chrome, Safari and Opera */
    .page-header h1::-webkit-scrollbar {
        display: none;
    }
}
